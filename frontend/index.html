<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HealthPredict AI — Patient Risk Assessment</title>
<style>
  :root {
    --primary: #0f5b78;
    --primary-dark: #0a4258;
    --bg: #f4f7f8;
    --card: #ffffff;
    --border: #d7e0e3;
    --text: #1c2b30;
    --muted: #5f7379;
    --danger: #c0392b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: var(--primary);
    color: white;
    padding: 20px 24px;
  }
  header h1 { margin: 0; font-size: 1.3rem; }
  header p { margin: 4px 0 0; font-size: 0.85rem; opacity: 0.85; }
  nav { margin-top: 12px; }
  nav a {
    color: white;
    text-decoration: none;
    margin-right: 16px;
    font-size: 0.85rem;
    border-bottom: 2px solid transparent;
  }
  nav a.active { border-bottom-color: white; }
  main { max-width: 640px; margin: 24px auto; padding: 0 16px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
  }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
  input {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.95rem;
  }
  .field { margin-bottom: 14px; }
  .full { grid-column: 1 / -1; }
  button {
    margin-top: 8px;
    background: var(--primary);
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 0.95rem;
    cursor: pointer;
    width: 100%;
  }
  button:hover { background: var(--primary-dark); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  #errorBox {
    display: none;
    background: #fdecea;
    color: var(--danger);
    border: 1px solid #f5c6cb;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 0.85rem;
    margin-bottom: 14px;
  }
</style>
</head>
<body>
<header>
  <h1>HealthPredict AI</h1>
  <p>Diabetes Risk Assessment — Clinical Staff Portal</p>
  <nav>
    <a href="index.html" class="active">New Prediction</a>
    <a href="history.html">History</a>
  </nav>
</header>

<main>
  <div class="card">
    <div id="errorBox"></div>
    <form id="predictForm">
      <div class="field full">
        <label for="patient_id">Patient ID</label>
        <input type="text" id="patient_id" required placeholder="e.g. PAT-0001" />
      </div>
      <div class="grid">
        <div class="field">
          <label for="pregnancies">Pregnancies</label>
          <input type="number" id="pregnancies" min="0" max="20" required />
        </div>
        <div class="field">
          <label for="glucose">Glucose (mg/dL)</label>
          <input type="number" id="glucose" min="0" max="500" step="0.1" required />
        </div>
        <div class="field">
          <label for="blood_pressure">Blood Pressure (mmHg)</label>
          <input type="number" id="blood_pressure" min="0" max="250" step="0.1" required />
        </div>
        <div class="field">
          <label for="skin_thickness">Skin Thickness (mm)</label>
          <input type="number" id="skin_thickness" min="0" max="100" step="0.1" required />
        </div>
        <div class="field">
          <label for="insulin">Insulin (mu U/mL)</label>
          <input type="number" id="insulin" min="0" max="900" step="0.1" required />
        </div>
        <div class="field">
          <label for="bmi">BMI</label>
          <input type="number" id="bmi" min="0" max="90" step="0.1" required />
        </div>
        <div class="field">
          <label for="diabetes_pedigree">Diabetes Pedigree Function</label>
          <input type="number" id="diabetes_pedigree" min="0" max="3" step="0.001" required />
        </div>
        <div class="field">
          <label for="age">Age (years)</label>
          <input type="number" id="age" min="0" max="120" required />
        </div>
      </div>
      <button type="submit" id="submitBtn">Get Risk Prediction</button>
    </form>
  </div>
</main>

<script src="config.js"></script>
<script>
const form = document.getElementById("predictForm");
const errorBox = document.getElementById("errorBox");
const submitBtn = document.getElementById("submitBtn");

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = "block";
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorBox.style.display = "none";
  submitBtn.disabled = true;
  submitBtn.textContent = "Submitting...";

  const payload = {
    patient_id: document.getElementById("patient_id").value.trim(),
    pregnancies: Number(document.getElementById("pregnancies").value),
    glucose: Number(document.getElementById("glucose").value),
    blood_pressure: Number(document.getElementById("blood_pressure").value),
    skin_thickness: Number(document.getElementById("skin_thickness").value),
    insulin: Number(document.getElementById("insulin").value),
    bmi: Number(document.getElementById("bmi").value),
    diabetes_pedigree: Number(document.getElementById("diabetes_pedigree").value),
    age: Number(document.getElementById("age").value),
  };

  try {
    const res = await fetch(`${API_CONFIG.INVOKE_URL}/predict`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_CONFIG.API_KEY,
      },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Prediction request failed");

    sessionStorage.setItem("lastPrediction", JSON.stringify(data));
    window.location.href = "results.html";
  } catch (err) {
    showError(err.message);
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "Get Risk Prediction";
  }
});
</script>
</body>
</html>
